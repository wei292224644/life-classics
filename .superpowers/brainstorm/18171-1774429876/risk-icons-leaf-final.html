<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>风险等级 Icon · 叶脉递进版</title>
<style>
  :root {
    --t0: #3D8B5A;
    --t1: #52A86E;
    --t2: #C9A92C;
    --t3: #D4692A;
    --t4: #B83A2E;
    --unknown: #8E8E9A;
    --bg: #0D0D0F;
    --surface: #18181C;
    --border: #2A2A30;
    --text: #F0EDE8;
    --text-muted: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    padding: 32px 16px 64px;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.02em;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #3D8B5A, #C9A92C, #B83A2E);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header p {
    color: var(--text-muted);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .cards {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px 20px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    width: 120px;
    transition: transform 0.2s ease, border-color 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: rgba(255,255,255,0.15);
  }

  .card-icon {
    width: 72px;
    height: 72px;
  }

  .card-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 3px 8px;
    border-radius: 20px;
    color: white;
  }

  .card-label {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    text-align: center;
  }

  .card-sublabel {
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
    margin-top: -6px;
  }

  /* SVG float animation */
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
  }

  .card:nth-child(1) .card-icon svg { animation: float 3s ease-in-out infinite; animation-delay: 0s; }
  .card:nth-child(2) .card-icon svg { animation: float 3s ease-in-out infinite; animation-delay: 0.5s; }
  .card:nth-child(3) .card-icon svg { animation: float 3s ease-in-out infinite; animation-delay: 1s; }
  .card:nth-child(4) .card-icon svg { animation: float 3s ease-in-out infinite; animation-delay: 1.5s; }
  .card:nth-child(5) .card-icon svg { animation: float 3s ease-in-out infinite; animation-delay: 2s; }
  .card:nth-child(6) .card-icon svg { animation: float 3s ease-in-out infinite; animation-delay: 2.5s; }

  .select-btn {
    display: block;
    margin: 32px auto 0;
    padding: 10px 32px;
    background: linear-gradient(135deg, #3D8B5A, #52A86E);
    color: white;
    border: none;
    border-radius: 24px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s;
  }

  .select-btn:hover { opacity: 0.85; }

  /* LIGHT SECTION */
  .light-section {
    background: #F5F3EF;
    border-radius: 24px;
    padding: 32px 16px;
    margin: 40px -16px 0;
  }

  .light-section .header h1 {
    background: linear-gradient(135deg, #3D8B5A, #C9A92C, #B83A2E);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .light-card {
    background: white;
    border: 1px solid #E8E4DC;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  }

  .light-card::before {
    background: linear-gradient(90deg, transparent, rgba(0,0,0,0.04), transparent);
  }

  .light-card:hover { border-color: rgba(0,0,0,0.15); }
  .light-card .card-label { color: #1A1A1A; }
  .light-card .card-sublabel { color: #888; }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 40px auto;
    width: 200px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Risk Level Icons</h1>
  <p>Organic Science · 叶脉递进</p>
</div>

<div class="legend" style="display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-bottom:40px;">
  <div class="legend-item" style="display:flex;align-items:center;gap:6px;font-size:11px;color:#888;">
    <div style="width:8px;height:8px;border-radius:50%;background:#3D8B5A"></div>t0 · 安全
  </div>
  <div class="legend-item" style="display:flex;align-items:center;gap:6px;font-size:11px;color:#888;">
    <div style="width:8px;height:8px;border-radius:50%;background:#52A86E"></div>t1 · 低风险
  </div>
  <div class="legend-item" style="display:flex;align-items:center;gap:6px;font-size:11px;color:#888;">
    <div style="width:8px;height:8px;border-radius:50%;background:#C9A92C"></div>t2 · 中等风险
  </div>
  <div class="legend-item" style="display:flex;align-items:center;gap:6px;font-size:11px;color:#888;">
    <div style="width:8px;height:8px;border-radius:50%;background:#D4692A"></div>t3 · 较高风险
  </div>
  <div class="legend-item" style="display:flex;align-items:center;gap:6px;font-size:11px;color:#888;">
    <div style="width:8px;height:8px;border-radius:50%;background:#B83A2E"></div>t4 · 严重风险
  </div>
  <div class="legend-item" style="display:flex;align-items:center;gap:6px;font-size:11px;color:#888;">
    <div style="width:8px;height:8px;border-radius:50%;background:#8E8E9A"></div>未知
  </div>
</div>

<div class="cards">

  <!-- t0: Safe - Lush leaf with 8 veins -->
  <div class="card">
    <div class="card-icon">
      <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g-t0" x1="36" y1="8" x2="36" y2="64" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#3D8B5A" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#3D8B5A" stop-opacity="0"/>
          </linearGradient>
          <filter id="glow-t0">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- Outer glow -->
        <ellipse cx="36" cy="36" rx="27" ry="29" stroke="#3D8B5A" stroke-width="0.5" stroke-opacity="0.25" fill="none"/>
        <!-- Shield -->
        <path d="M36 10L14 20v16c0 14 9.5 27 22 32 12.5-5 22-18 22-32V20L36 10z"
              fill="url(#g-t0)" stroke="#3D8B5A" stroke-width="2.2" stroke-linejoin="round"/>
        <!-- Inner outline -->
        <path d="M36 18L20 26v11c0 9.5 6.5 18.5 16 22 9.5-3.5 16-12.5 16-22V26L36 18z"
              stroke="#3D8B5A" stroke-width="0.8" stroke-opacity="0.25" fill="none" stroke-linejoin="round"/>
        <!-- Lush leaf + 8 veins -->
        <path d="M36 54c-7-7-10-14-10-20a10 10 0 0120 0c0 6-3 13-10 20z"
              stroke="#3D8B5A" stroke-width="1.5" fill="none"/>
        <line x1="36" y1="54" x2="36" y2="34" stroke="#3D8B5A" stroke-width="1.5"/>
        <line x1="36" y1="48" x2="26" y2="40" stroke="#3D8B5A" stroke-width="1"/>
        <line x1="36" y1="48" x2="46" y2="40" stroke="#3D8B5A" stroke-width="1"/>
        <line x1="36" y1="43" x2="28" y2="36" stroke="#3D8B5A" stroke-width="1"/>
        <line x1="36" y1="43" x2="44" y2="36" stroke="#3D8B5A" stroke-width="1"/>
        <line x1="36" y1="38" x2="30" y2="32" stroke="#3D8B5A" stroke-width="1"/>
        <line x1="36" y1="38" x2="42" y2="32" stroke="#3D8B5A" stroke-width="1"/>
        <line x1="36" y1="34" x2="32" y2="29" stroke="#3D8B5A" stroke-width="0.8"/>
        <line x1="36" y1="34" x2="40" y2="29" stroke="#3D8B5A" stroke-width="0.8"/>
        <!-- Top sparkle -->
        <circle cx="36" cy="14" r="1.5" fill="#3D8B5A" opacity="0.5"/>
      </svg>
    </div>
    <span class="card-badge" style="background:#3D8B5A">t0</span>
    <div class="card-label">安全</div>
    <div class="card-sublabel">叶脉饱满</div>
  </div>

  <!-- t1: Low - 6 veins, still full -->
  <div class="card">
    <div class="card-icon">
      <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g-t1" x1="36" y1="8" x2="36" y2="64" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#52A86E" stop-opacity="0.15"/>
            <stop offset="100%" stop-color="#52A86E" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <ellipse cx="36" cy="36" rx="27" ry="29" stroke="#52A86E" stroke-width="0.5" stroke-opacity="0.2" fill="none"/>
        <path d="M36 10L14 20v16c0 14 9.5 27 22 32 12.5-5 22-18 22-32V20L36 10z"
              fill="url(#g-t1)" stroke="#52A86E" stroke-width="2.2" stroke-linejoin="round"/>
        <path d="M36 18L20 26v11c0 9.5 6.5 18.5 16 22 9.5-3.5 16-12.5 16-22V26L36 18z"
              stroke="#52A86E" stroke-width="0.8" stroke-opacity="0.25" fill="none" stroke-linejoin="round"/>
        <!-- 6 veins -->
        <path d="M36 54c-7-7-10-14-10-20a10 10 0 0120 0c0 6-3 13-10 20z"
              stroke="#52A86E" stroke-width="1.5" fill="none"/>
        <line x1="36" y1="54" x2="36" y2="34" stroke="#52A86E" stroke-width="1.5"/>
        <line x1="36" y1="48" x2="27" y2="41" stroke="#52A86E" stroke-width="1"/>
        <line x1="36" y1="48" x2="45" y2="41" stroke="#52A86E" stroke-width="1"/>
        <line x1="36" y1="43" x2="29" y2="36" stroke="#52A86E" stroke-width="1"/>
        <line x1="36" y1="43" x2="43" y2="36" stroke="#52A86E" stroke-width="1"/>
        <line x1="36" y1="38" x2="31" y2="32" stroke="#52A86E" stroke-width="1"/>
        <line x1="36" y1="38" x2="41" y2="32" stroke="#52A86E" stroke-width="1"/>
        <circle cx="36" cy="14" r="1.5" fill="#52A86E" opacity="0.4"/>
      </svg>
    </div>
    <span class="card-badge" style="background:#52A86E">t1</span>
    <div class="card-label">低风险</div>
    <div class="card-sublabel">6 侧脉</div>
  </div>

  <!-- t2: Medium - 4 veins, slight amber -->
  <div class="card">
    <div class="card-icon">
      <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g-t2" x1="36" y1="8" x2="36" y2="64" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#C9A92C" stop-opacity="0.15"/>
            <stop offset="100%" stop-color="#C9A92C" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <ellipse cx="36" cy="36" rx="27" ry="29" stroke="#C9A92C" stroke-width="0.5" stroke-opacity="0.2" fill="none"/>
        <path d="M36 10L14 20v16c0 14 9.5 27 22 32 12.5-5 22-18 22-32V20L36 10z"
              fill="url(#g-t2)" stroke="#C9A92C" stroke-width="2.2" stroke-linejoin="round"/>
        <path d="M36 18L20 26v11c0 9.5 6.5 18.5 16 22 9.5-3.5 16-12.5 16-22V26L36 18z"
              stroke="#C9A92C" stroke-width="0.8" stroke-opacity="0.25" fill="none" stroke-linejoin="round"/>
        <!-- 4 veins - amber, slightly curling -->
        <path d="M36 54c-6-6-9-12-9-18a9 9 0 0118 0c0 6-3 12-9 18z"
              stroke="#C9A92C" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
        <line x1="36" y1="54" x2="36" y2="36" stroke="#C9A92C" stroke-width="1.5"/>
        <line x1="36" y1="46" x2="28" y2="40" stroke="#C9A92C" stroke-width="1"/>
        <line x1="36" y1="46" x2="44" y2="40" stroke="#C9A92C" stroke-width="1"/>
        <line x1="36" y1="40" x2="30" y2="34" stroke="#C9A92C" stroke-width="1"/>
        <line x1="36" y1="40" x2="42" y2="34" stroke="#C9A92C" stroke-width="1"/>
        <circle cx="36" cy="14" r="1.5" fill="#C9A92C" opacity="0.4"/>
      </svg>
    </div>
    <span class="card-badge" style="background:#C9A92C">t2</span>
    <div class="card-label">中等风险</div>
    <div class="card-sublabel">4 侧脉</div>
  </div>

  <!-- t3: High - 2 veins, wilting -->
  <div class="card">
    <div class="card-icon">
      <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g-t3" x1="36" y1="8" x2="36" y2="64" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#D4692A" stop-opacity="0.15"/>
            <stop offset="100%" stop-color="#D4692A" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <ellipse cx="36" cy="36" rx="27" ry="29" stroke="#D4692A" stroke-width="0.5" stroke-opacity="0.25" fill="none"/>
        <path d="M36 10L14 20v16c0 14 9.5 27 22 32 12.5-5 22-18 22-32V20L36 10z"
              fill="url(#g-t3)" stroke="#D4692A" stroke-width="2.2" stroke-linejoin="round"/>
        <path d="M36 18L20 26v11c0 9.5 6.5 18.5 16 22 9.5-3.5 16-12.5 16-22V26L36 18z"
              stroke="#D4692A" stroke-width="0.8" stroke-opacity="0.25" fill="none" stroke-linejoin="round"/>
        <!-- Wilting leaf, 2 veins -->
        <path d="M36 52c-5-5-8-10-8-15a8 8 0 0116 0c0 5-3 10-8 15z"
              stroke="#D4692A" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
        <line x1="36" y1="52" x2="36" y2="37" stroke="#D4692A" stroke-width="1.5"/>
        <line x1="36" y1="44" x2="30" y2="39" stroke="#D4692A" stroke-width="1"/>
        <line x1="36" y1="44" x2="42" y2="39" stroke="#D4692A" stroke-width="1"/>
        <!-- Warning -->
        <circle cx="36" cy="14" r="2" fill="#D4692A" opacity="0.5"/>
      </svg>
    </div>
    <span class="card-badge" style="background:#D4692A">t3</span>
    <div class="card-label">较高风险</div>
    <div class="card-sublabel">2 侧脉 · 叶片枯萎</div>
  </div>

  <!-- t4: Critical - near death, almost no veins -->
  <div class="card">
    <div class="card-icon">
      <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g-t4" x1="36" y1="8" x2="36" y2="64" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#B83A2E" stop-opacity="0.2"/>
            <stop offset="100%" stop-color="#B83A2E" stop-opacity="0.03"/>
          </linearGradient>
          <filter id="glow-t4">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- Danger glow -->
        <ellipse cx="36" cy="40" rx="28" ry="30" stroke="#B83A2E" stroke-width="1" stroke-opacity="0.15" fill="none" filter="url(#glow-t4)"/>
        <ellipse cx="36" cy="36" rx="27" ry="29" stroke="#B83A2E" stroke-width="0.5" stroke-opacity="0.25" fill="none"/>
        <path d="M36 10L14 20v16c0 14 9.5 27 22 32 12.5-5 22-18 22-32V20L36 10z"
              fill="url(#g-t4)" stroke="#B83A2E" stroke-width="2.2" stroke-linejoin="round"/>
        <path d="M36 18L20 26v11c0 9.5 6.5 18.5 16 22 9.5-3.5 16-12.5 16-22V26L36 18z"
              stroke="#B83A2E" stroke-width="0.8" stroke-opacity="0.2" fill="none" stroke-linejoin="round"/>
        <!-- Near-dead leaf, 1 vein -->
        <path d="M36 50c-4-4-6-8-6-12a6 6 0 0112 0c0 4-2 8-6 12z"
              stroke="#B83A2E" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
        <line x1="36" y1="50" x2="36" y2="38" stroke="#B83A2E" stroke-width="1.5"/>
        <!-- Exclamation mark -->
        <line x1="36" y1="24" x2="36" y2="34" stroke="#B83A2E" stroke-width="2" stroke-opacity="0.8" stroke-linecap="round"/>
        <circle cx="36" cy="38" r="1.5" fill="#B83A2E" opacity="0.8"/>
        <!-- Top warning -->
        <circle cx="36" cy="14" r="2" fill="#B83A2E" opacity="0.4"/>
      </svg>
    </div>
    <span class="card-badge" style="background:#B83A2E">t4</span>
    <div class="card-label">严重风险</div>
    <div class="card-sublabel">1 侧脉 · 濒死</div>
  </div>

  <!-- Unknown -->
  <div class="card">
    <div class="card-icon">
      <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g-un" x1="36" y1="8" x2="36" y2="64" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#8E8E9A" stop-opacity="0.08"/>
            <stop offset="100%" stop-color="#8E8E9A" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <ellipse cx="36" cy="36" rx="26" ry="28" stroke="#8E8E9A" stroke-width="0.5" stroke-opacity="0.15" fill="none" stroke-dasharray="4 3"/>
        <path d="M36 10L14 20v16c0 14 9.5 27 22 32 12.5-5 22-18 22-32V20L36 10z"
              fill="url(#g-un)" stroke="#8E8B9A" stroke-width="2.2" stroke-linejoin="round" stroke-dasharray="6 4"/>
        <path d="M36 18L20 26v11c0 9.5 6.5 18.5 16 22 9.5-3.5 16-12.5 16-22V26L36 18z"
              stroke="#8E8E9A" stroke-width="0.8" stroke-opacity="0.15" fill="none" stroke-linejoin="round"/>
        <text x="36" y="46" font-size="22" font-family="Georgia, serif" font-weight="bold" fill="#8E8E9A" text-anchor="middle" opacity="0.7">?</text>
        <circle cx="36" cy="14" r="1" fill="#8E8E9A" opacity="0.25"/>
      </svg>
    </div>
    <span class="card-badge" style="background:#8E8E9A">?</span>
    <div class="card-label">未知</div>
    <div class="card-sublabel">暂无数据</div>
  </div>

</div>

<button class="select-btn" onclick="this.textContent='✓ 已选择'; this.style.background='linear-gradient(135deg,#3D8B5A,#52A86E)'">选择此设计方案</button>

<hr class="divider">

<!-- LIGHT MODE -->
<div class="light-section">
  <div class="header">
    <h1>Risk Level Icons</h1>
    <p>Light Mode</p>
  </div>

  <div class="cards">

    <div class="card light-card">
      <div class="card-icon">
        <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M36 10L14 20v16c0 14 9.5 27 22 32 12.5-5 22-18 22-32V20L36 10z" stroke="#3D8B5A" stroke-width="2.2" stroke-linejoin="round"/>
          <path d="M36 54c-7-7-10-14-10-20a10 10 0 0120 0c0 6-3 13-10 20z" stroke="#3D8B5A" stroke-width="1.5" fill="none"/>
          <line x1="36" y1="54" x2="36" y2="34" stroke="#3D8B5A" stroke-width="1.5"/>
          <line x1="36" y1="48" x2="26" y2="40" stroke="#3D8B5A" stroke-width="1"/>
          <line x1="36" y1="48" x2="46" y2="40" stroke="#3D8B5A" stroke-width="1"/>
          <line x1="36" y1="43" x2="28" y2="36" stroke="#3D8B5A" stroke-width="1"/>
          <line x1="36" y1="43" x2="44" y2="36" stroke="#3D8B5A" stroke-width="1"/>
          <line x1="36" y1="38" x2="30" y2="32" stroke="#3D8B5A" stroke-width="1"/>
          <line x1="36" y1="38" x2="42" y2="32" stroke="#3D8B5A" stroke-width="1"/>
          <line x1="36" y1="34" x2="32" y2="29" stroke="#3D8B5A" stroke-width="0.8"/>
          <line x1="36" y1="34" x2="40" y2="29" stroke="#3D8B5A" stroke-width="0.8"/>
        </svg>
      </div>
      <span class="card-badge" style="background:#3D8B5A">t0</span>
      <div class="card-label">安全</div>
      <div class="card-sublabel">叶脉饱满</div>
