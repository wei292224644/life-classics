<h2>上传页面（左右分栏）</h2>
<p class="subtitle">左侧上传区，右侧流水线进度面板</p>

<div class="mockup" style="max-width:780px;margin:0 auto">
  <div class="mockup-header">上传页面</div>
  <div class="mockup-body" style="background:#0f0f0f;padding:16px;font-family:monospace">

    <!-- Tab Nav -->
    <div style="display:flex;gap:2px;border-bottom:1px solid #333;margin-bottom:24px">
      <div style="padding:6px 16px;color:#666;font-size:12px">Chunks</div>
      <div style="padding:6px 16px;color:#e5e5e5;font-size:12px;border-bottom:2px solid #7c3aed">上传</div>
      <div style="padding:6px 16px;color:#666;font-size:12px">对话</div>
    </div>

    <!-- Two Column -->
    <div style="display:flex;gap:20px;align-items:flex-start">

      <!-- Left: Upload -->
      <div style="flex:1;display:flex;flex-direction:column;gap:12px">
        <div style="color:#999;font-size:11px;text-transform:uppercase;letter-spacing:1px">上传文件</div>

        <!-- Drop Zone -->
        <div style="border:2px dashed #444;border-radius:10px;padding:36px 16px;text-align:center;background:#1a1a1a">
          <div style="font-size:26px;margin-bottom:8px">📄</div>
          <div style="color:#e5e5e5;font-size:12px;margin-bottom:4px">拖拽 .md 文件到此处</div>
          <div style="color:#666;font-size:11px;margin-bottom:14px">或点击选择 · 最大 5MB</div>
          <div style="background:#7c3aed;color:white;padding:6px 18px;border-radius:6px;font-size:11px;display:inline-block">选择文件</div>
        </div>

        <!-- Selected File -->
        <div style="padding:9px 12px;background:#1a1a1a;border:1px solid #333;border-radius:6px;display:flex;align-items:center;gap:8px">
          <span style="color:#a78bfa;font-size:12px">📝</span>
          <span style="color:#e5e5e5;font-size:11px;flex:1">GB_2762-2022.md</span>
          <span style="color:#666;font-size:10px">42 KB</span>
          <span style="color:#555;font-size:11px;cursor:pointer">✕</span>
        </div>

        <!-- Upload Button -->
        <button style="width:100%;background:#7c3aed;color:white;border:none;padding:9px;border-radius:6px;font-size:12px;cursor:pointer;opacity:0.6">上传中…</button>
      </div>

      <!-- Right: Pipeline Progress -->
      <div style="flex:1;display:flex;flex-direction:column;gap:10px">
        <div style="color:#999;font-size:11px;text-transform:uppercase;letter-spacing:1px">处理进度</div>

        <div style="background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:16px;display:flex;flex-direction:column;gap:10px">

          <!-- Done -->
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:18px;height:18px;border-radius:50%;background:#4ade80;display:flex;align-items:center;justify-content:center;font-size:9px;color:#0f0f0f;font-weight:bold;flex-shrink:0">✓</div>
            <span style="color:#6b7280;font-size:12px">解析 Markdown</span>
          </div>

          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:18px;height:18px;border-radius:50%;background:#4ade80;display:flex;align-items:center;justify-content:center;font-size:9px;color:#0f0f0f;font-weight:bold;flex-shrink:0">✓</div>
            <span style="color:#6b7280;font-size:12px">清洗内容</span>
          </div>

          <!-- Active -->
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:18px;height:18px;border-radius:50%;background:#7c3aed;flex-shrink:0;display:flex;align-items:center;justify-content:center">
              <div style="width:8px;height:8px;border:2px solid white;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite"></div>
            </div>
            <span style="color:#e5e5e5;font-size:12px;font-weight:bold">识别结构类型</span>
          </div>

          <!-- Pending -->
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:18px;height:18px;border-radius:50%;background:#2a2a2a;border:1px solid #444;flex-shrink:0"></div>
            <span style="color:#444;font-size:12px">切片</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:18px;height:18px;border-radius:50%;background:#2a2a2a;border:1px solid #444;flex-shrink:0"></div>
            <span style="color:#444;font-size:12px">分类语义类型</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:18px;height:18px;border-radius:50%;background:#2a2a2a;border:1px solid #444;flex-shrink:0"></div>
            <span style="color:#444;font-size:12px">处理低置信度 Chunk</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:18px;height:18px;border-radius:50%;background:#2a2a2a;border:1px solid #444;flex-shrink:0"></div>
            <span style="color:#444;font-size:12px">交叉引用富化</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:18px;height:18px;border-radius:50%;background:#2a2a2a;border:1px solid #444;flex-shrink:0"></div>
            <span style="color:#444;font-size:12px">内容转换</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:18px;height:18px;border-radius:50%;background:#2a2a2a;border:1px solid #444;flex-shrink:0"></div>
            <span style="color:#444;font-size:12px">合并相邻 Chunk</span>
          </div>
        </div>

        <!-- 右侧空状态提示 -->
        <div style="color:#555;font-size:11px;text-align:center">上传前此处不显示内容</div>
      </div>

    </div>
  </div>
</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<p class="subtitle" style="margin-top:16px;text-align:center">右侧进度面板仅在上传中显示，上传前为空。确认布局合适吗？</p>
