<h2>上传页面（修订版）</h2>
<p class="subtitle">移除了上传记录，调整为居中单栏布局，新增流水线进度面板。看看这样是否合适？</p>

<div class="mockup" style="max-width:600px;margin:0 auto">
  <div class="mockup-header">上传页面 — 居中单栏</div>
  <div class="mockup-body" style="background:#0f0f0f;padding:16px;font-family:monospace;display:flex;flex-direction:column;align-items:center">

    <!-- Tab Nav -->
    <div style="width:100%;display:flex;gap:2px;border-bottom:1px solid #333;margin-bottom:24px">
      <div style="padding:6px 16px;color:#666;font-size:12px">Chunks</div>
      <div style="padding:6px 16px;color:#e5e5e5;font-size:12px;border-bottom:2px solid #7c3aed">上传</div>
      <div style="padding:6px 16px;color:#666;font-size:12px">对话</div>
    </div>

    <!-- Upload Area - Centered, max-width 520px -->
    <div style="width:100%;max-width:480px;display:flex;flex-direction:column;gap:12px">

      <!-- Drop Zone -->
      <div style="border:2px dashed #444;border-radius:10px;padding:36px 24px;text-align:center;background:#1a1a1a">
        <div style="font-size:28px;margin-bottom:8px">📄</div>
        <div style="color:#e5e5e5;font-size:13px;margin-bottom:4px">拖拽 .md 文件到此处</div>
        <div style="color:#666;font-size:12px;margin-bottom:16px">或点击选择文件 · 最大 5MB</div>
        <div style="background:#7c3aed;color:white;padding:7px 22px;border-radius:6px;font-size:12px;display:inline-block;cursor:pointer">选择文件</div>
      </div>

      <!-- Selected File -->
      <div style="padding:10px 14px;background:#1a1a1a;border:1px solid #333;border-radius:6px;display:flex;align-items:center;gap:8px">
        <span style="color:#a78bfa;font-size:13px">📝</span>
        <span style="color:#e5e5e5;font-size:12px;flex:1">GB_2762-2022.md</span>
        <span style="color:#666;font-size:11px">42 KB</span>
        <span style="color:#666;font-size:11px;cursor:pointer">✕</span>
      </div>

      <!-- Upload Button -->
      <button style="width:100%;background:#7c3aed;color:white;border:none;padding:10px;border-radius:6px;font-size:13px;cursor:pointer">上传并入库</button>

      <!-- Pipeline Progress Panel (shown during upload) -->
      <div style="background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:16px">
        <div style="color:#e5e5e5;font-size:12px;font-weight:bold;margin-bottom:12px">正在处理，请稍候…</div>
        <div style="display:flex;flex-direction:column;gap:8px">

          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:16px;height:16px;border-radius:50%;background:#4ade80;display:flex;align-items:center;justify-content:center;font-size:9px;color:#0f0f0f;font-weight:bold;flex-shrink:0">✓</div>
            <span style="color:#6b7280;font-size:11px">解析 Markdown</span>
          </div>

          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:16px;height:16px;border-radius:50%;background:#4ade80;display:flex;align-items:center;justify-content:center;font-size:9px;color:#0f0f0f;font-weight:bold;flex-shrink:0">✓</div>
            <span style="color:#6b7280;font-size:11px">清洗内容</span>
          </div>

          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:16px;height:16px;border-radius:50%;background:#7c3aed;flex-shrink:0;display:flex;align-items:center;justify-content:center">
              <div style="width:8px;height:8px;border:2px solid white;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite"></div>
            </div>
            <span style="color:#e5e5e5;font-size:11px;font-weight:bold">识别结构类型</span>
          </div>

          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:16px;height:16px;border-radius:50%;background:#333;flex-shrink:0"></div>
            <span style="color:#555;font-size:11px">切片</span>
          </div>

          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:16px;height:16px;border-radius:50%;background:#333;flex-shrink:0"></div>
            <span style="color:#555;font-size:11px">分类语义类型</span>
          </div>

          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:16px;height:16px;border-radius:50%;background:#333;flex-shrink:0"></div>
            <span style="color:#555;font-size:11px">处理低置信度 Chunk</span>
          </div>

          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:16px;height:16px;border-radius:50%;background:#333;flex-shrink:0"></div>
            <span style="color:#555;font-size:11px">交叉引用富化</span>
          </div>

          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:16px;height:16px;border-radius:50%;background:#333;flex-shrink:0"></div>
            <span style="color:#555;font-size:11px">内容转换</span>
          </div>

          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:16px;height:16px;border-radius:50%;background:#333;flex-shrink:0"></div>
            <span style="color:#555;font-size:11px">合并相邻 Chunk</span>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<p class="subtitle" style="margin-top:16px;text-align:center">这是上传中的状态，流水线阶段依次点亮。请确认布局是否合适？</p>
