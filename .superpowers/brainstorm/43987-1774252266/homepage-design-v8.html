<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>首页 · 最终设计稿 v2</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, 'Inter', sans-serif;
  background: #0a0a0f;
  min-height: 100vh;
  padding: 40px 20px 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 40px;
}

h1 { color: white; font-size: 22px; font-weight: 700; text-align: center; }
.page-sub { color: rgba(255,255,255,0.45); font-size: 13px; text-align: center; margin-top: 4px; }

.phones-row {
  display: flex;
  gap: 36px;
  flex-wrap: wrap;
  justify-content: center;
}
.phone-col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.mode-badge {
  font-size: 11px; font-weight: 600;
  padding: 3px 12px; border-radius: 20px;
  letter-spacing: 0.02em;
}
.mode-light { background: #f3f4f6; color: #374151; }
.mode-dark  { background: #1f2937; color: #9ca3af; }

.phone-shell {
  background: #141414;
  border-radius: 52px;
  padding: 12px;
  width: 290px;
  box-shadow: 0 0 0 1px #2a2a2a, 0 32px 64px rgba(0,0,0,0.7), inset 0 0 0 2px #1a1a1a;
}
.phone-notch {
  background: #141414;
  width: 90px; height: 22px;
  border-radius: 0 0 16px 16px;
  margin: 0 auto -5px;
  position: relative; z-index: 2;
}
.phone-screen {
  border-radius: 40px;
  overflow: hidden;
  height: 620px;
  overflow-y: auto;
  scrollbar-width: none;
  position: relative;
}
.phone-screen::-webkit-scrollbar { display: none; }

/* ═══════ LIGHT ═══════ */
.screen-l {
  background: #f3f4f6;
  --bg-page: #f3f4f6;
  --fg: #111827;
  --card: #ffffff;
  --muted-fg: #9ca3af;
  --border: #e5e7eb;
  --accent: #db2777;
  --accent-light: #f472b6;
  --accent-btn-bg: linear-gradient(135deg, #ec4899 0%, #db2777 100%);
  --tab-inactive: #d1d5db;
  --tab-border: #e5e7eb;
  --scan-count-bg: #fef2f2;
  --scan-count-fg: #dc2626;
  --divider: #e5e7eb;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.06);
}

/* ═══════ DARK ═══════ */
.screen-d {
  background: #0f0f0f;
  --bg-page: #0f0f0f;
  --fg: #f3f4f6;
  --card: #1a1a1a;
  --muted-fg: #6b7280;
  --border: #2d2d2d;
  --accent: #f472b6;
  --accent-light: #f9a8d4;
  --accent-btn-bg: linear-gradient(135deg, #ec4899 0%, #db2777 100%);
  --tab-inactive: #4b5563;
  --tab-border: #2d2d2d;
  --scan-count-bg: #2d1a1a;
  --scan-count-fg: #f87171;
  --divider: #2d2d2d;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.3);
}

/* ─── Page Layout ─── */
.page {
  background: var(--bg-page);
  min-height: 100%;
  display: flex;
  flex-direction: column;
  padding-bottom: 64px;
}

/* ─── Hero ─── */
.hero {
  background: var(--card);
  padding: 32px 24px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  border-bottom: 1px solid var(--border);
}
.hero-emoji { font-size: 40px; line-height: 1; margin-bottom: 10px; animation: floatIn 0.5s ease-out; }
.hero-title { font-size: 20px; font-weight: 700; color: var(--fg); letter-spacing: -0.2px; }
.hero-sub { font-size: 12px; color: var(--muted-fg); margin-top: 4px; }

/* ─── CTA ─── */
.scan-cta {
  margin-top: 20px;
  width: 100%;
  padding: 16px 20px;
  background: var(--accent-btn-bg);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 4px 16px rgba(219,39,119,0.2);
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.scan-cta:hover { transform: scale(1.01); box-shadow: 0 6px 20px rgba(219,39,119,0.28); }
.scan-cta:active { transform: scale(0.99); }
.scan-cta-text { color: white; font-size: 16px; font-weight: 600; letter-spacing: -0.1px; }

/* ─── Divider with label ─── */
.section-divider {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 24px 12px;
}
.divider-line { flex: 1; height: 1px; background: var(--divider); }
.section-label { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.section-label span { font-size: 12px; color: var(--muted-fg); font-weight: 500; }
.scan-count {
  background: var(--scan-count-bg); color: var(--scan-count-fg);
  font-size: 10px; font-weight: 700;
  padding: 2px 6px; border-radius: 9999px;
}

/* ─── Scan List ─── */
.scan-list { padding: 0 24px 20px; display: flex; flex-direction: column; gap: 8px; }
.scan-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: var(--shadow-card);
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.scan-item:hover { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,0.08); }
.scan-item:active { transform: translateY(0); }
.scan-icon {
  width: 42px; height: 42px; border-radius: 10px;
  background: var(--card);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.scan-info { flex: 1; min-width: 0; }
.scan-name { font-size: 14px; font-weight: 600; color: var(--fg); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.scan-time { font-size: 12px; color: var(--muted-fg); }
.scan-arrow { color: var(--muted-fg); flex-shrink: 0; }

/* ─── TabBar ─── */
.tabbar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 64px;
  background: var(--card);
  border-top: 1px solid var(--tab-border);
  display: flex; justify-content: space-around; align-items: center;
  padding: 0 8px;
}
.tab-item { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 20px; cursor: pointer; }
.tab-item svg { width: 22px; height: 22px; }
.tab-item span { font-size: 10px; font-weight: 600; }
.tab-home svg { fill: var(--accent); }
.tab-home span { color: var(--accent); }
.tab-inactive svg { fill: none; stroke: var(--tab-inactive); stroke-width: 2; }
.tab-inactive span { color: var(--tab-inactive); }

/* ─── Accessibility ─── */
.scan-cta:focus-visible,
.tab-item:focus-visible,
.scan-item:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

@media (prefers-reduced-motion: reduce) {
  .hero-emoji { animation: none; }
  .scan-cta, .scan-item { transition: none; }
}

@keyframes floatIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}
</style>
</head>
