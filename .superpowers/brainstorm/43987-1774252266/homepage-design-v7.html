<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>首页 · 最终设计稿</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, 'Inter', sans-serif;
  background: #0a0a0f;
  min-height: 100vh;
  padding: 40px 20px 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 40px;
}

h1 { color: white; font-size: 22px; font-weight: 700; text-align: center; }
.page-sub { color: rgba(255,255,255,0.45); font-size: 13px; text-align: center; margin-top: 4px; }

.phones-row {
  display: flex;
  gap: 36px;
  flex-wrap: wrap;
  justify-content: center;
}

.phone-col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.mode-badge {
  font-size: 11px; font-weight: 600;
  padding: 3px 12px; border-radius: 20px;
  letter-spacing: 0.02em;
}
.mode-light { background: #f3f4f6; color: #374151; }
.mode-dark  { background: #1f2937; color: #9ca3af; }

.phone-shell {
  background: #141414;
  border-radius: 52px;
  padding: 12px;
  width: 290px;
  box-shadow: 0 0 0 1px #2a2a2a, 0 32px 64px rgba(0,0,0,0.7), inset 0 0 0 2px #1a1a1a;
}
.phone-notch {
  background: #141414;
  width: 90px; height: 22px;
  border-radius: 0 0 16px 16px;
  margin: 0 auto -5px;
  position: relative; z-index: 2;
}
.phone-screen {
  border-radius: 40px;
  overflow: hidden;
  height: 620px;
  overflow-y: auto;
  scrollbar-width: none;
  position: relative;
}
.phone-screen::-webkit-scrollbar { display: none; }

/* ═══════ LIGHT ═══════ */
.screen-l {
  background: #f9fafb;
  --fg: #111827;
  --card: #ffffff;
  --muted-fg: #9ca3af;
  --border: #e5e7eb;
  --accent: #db2777;
  --accent-light: #f472b6;
  --tab-inactive: #9ca3af;
  --scan-badge-bg: #fef2f2;
  --scan-badge-fg: #dc2626;
  --divider: #e5e7eb;
  --shadow-card: 0 2px 8px rgba(0,0,0,0.05);
}

/* ═══════ DARK ═══════ */
.screen-d {
  background: #0f0f0f;
  --fg: #f3f4f6;
  --card: #1a1a1a;
  --muted-fg: #6b7280;
  --border: #2d2d2d;
  --accent: #f472b6;
  --accent-light: #f9a8d4;
  --tab-inactive: #6b7280;
  --scan-badge-bg: #2d1a1a;
  --scan-badge-fg: #f87171;
  --divider: #2d2d2d;
  --shadow-card: 0 2px 8px rgba(0,0,0,0.3);
}

/* ─── Hero ─── */
.hero {
  background: var(--card);
  padding: 36px 24px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}
.hero-deco {
  position: absolute; top: 20px; right: 24px;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); opacity: 0.5;
}
.hero-deco-2 {
  position: absolute; top: 32px; right: 36px;
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--accent-light); opacity: 0.35;
}
.hero-emoji { font-size: 52px; line-height: 1; margin-bottom: 14px; animation: floatIn 0.5s ease-out; }
.hero-title { font-size: 22px; font-weight: 700; color: var(--fg); letter-spacing: -0.3px; }
.hero-sub { font-size: 13px; color: var(--muted-fg); margin-top: 6px; }

/* ─── CTA ─── */
.scan-cta {
  margin-top: 28px;
  width: 100%; padding: 20px;
  background: linear-gradient(135deg, var(--accent-light) 0%, var(--accent) 100%);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  box-shadow: 0 8px 32px rgba(219,39,119,0.28);
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.scan-cta:hover { transform: scale(1.02); box-shadow: 0 12px 40px rgba(219,39,119,0.36); }
.scan-cta-text { color: white; font-size: 18px; font-weight: 700; letter-spacing: -0.2px; }
.scan-hint { font-size: 11px; color: var(--muted-fg); margin-top: 10px; }

/* ─── Divider ─── */
.section-divider {
  display: flex; align-items: center; gap: 10px;
  padding: 20px 24px 14px;
}
.divider-line { flex: 1; height: 1px; background: var(--divider); }
.section-label { display: flex; align-items: center; gap: 6px; }
.section-label span { font-size: 12px; color: var(--muted-fg); font-weight: 500; }
.scan-count {
  background: var(--scan-badge-bg); color: var(--scan-badge-fg);
  font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 9999px;
}

/* ─── Scan List ─── */
.scan-list { padding: 0 24px 16px; display: flex; flex-direction: column; gap: 10px; }
.scan-item {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 15px 16px;
  display: flex; align-items: center; gap: 14px;
  box-shadow: var(--shadow-card); cursor: pointer;
  transition: transform 0.15s ease;
}
.scan-item:hover { transform: translateY(-2px); }
.scan-icon {
  width: 46px; height: 46px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; flex-shrink: 0;
}
.scan-info { flex: 1; min-width: 0; }
.scan-name { font-size: 14px; font-weight: 600; color: var(--fg); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.scan-time { font-size: 12px; color: var(--muted-fg); }
.scan-arrow { color: var(--muted-fg); flex-shrink: 0; }

/* ─── TabBar ─── */
.tabbar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 64px;
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-around; align-items: center;
  padding: 0 8px;
}
.tab-item { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 20px; cursor: pointer; }
.tab-item svg { width: 24px; height: 24px; }
.tab-item span { font-size: 10px; font-weight: 600; }
.tab-home svg { fill: var(--accent); }
.tab-home span { color: var(--accent); }
.tab-inactive svg { fill: none; stroke: var(--tab-inactive); stroke-width: 2; }
.tab-inactive span { color: var(--tab-inactive); }

@keyframes floatIn {
  from { opacity: 0; transform: scale(0.85) translateY(8px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
</style>
</head>
