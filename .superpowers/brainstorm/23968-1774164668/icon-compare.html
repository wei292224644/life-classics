<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>低风险图标对比</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0f0f0f; min-height: 100vh; padding: 40px 20px; }
h1 { color: #fff; font-size: 20px; text-align: center; margin-bottom: 40px; }
h2 { color: #666; font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; text-align: center; }
.grid { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; max-width: 900px; margin: 0 auto; }
.card { width: 200px; background: #1a1a1a; border-radius: 20px; border: 1px solid rgba(255,255,255,0.06); padding: 24px; text-align: center; }
.card .icon-wrap { width: 64px; height: 64px; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
.card .label { color: #fff; font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.card .sublabel { color: #6b7280; font-size: 12px; }

.wrap-dark { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); }
.wrap-light { background: #fff; border: 1px solid rgba(0,0,0,0.06); }

.icon-dark { color: #22c55e; }
.icon-light { color: #16a34a; }

.icon-wrap svg { width: 32px; height: 32px; }
</style>
</head>
<body>
<h1>低风险图标方案对比</h1>

<h2>深色背景</h2>
<div class="grid">
  <div class="card">
    <div class="icon-wrap wrap-dark"><svg class="icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg></div>
    <div class="label">A</div><div class="sublabel">盾牌 + 勾</div>
  </div>
  <div class="card">
    <div class="icon-wrap wrap-dark"><svg class="icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/></svg></div>
    <div class="label">B</div><div class="sublabel">圆形 + 勾</div>
  </div>
  <div class="card">
    <div class="icon-wrap wrap-dark"><svg class="icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6.5 21C3 17.5 3 12 6 8c2-2.5 5-4 8.5-4C18 4 21 7 21 10c0 2.5-1.5 4.5-3.5 5.5"/><path d="M12 22V12"/></svg></div>
    <div class="label">C</div><div class="sublabel">叶子</div>
  </div>
  <div class="card">
    <div class="icon-wrap wrap-dark"><svg class="icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
    <div class="label">D</div><div class="sublabel">星星</div>
  </div>
</div>

<h2 style="margin-top:48px;">浅色背景</h2>
<div class="grid">
  <div class="card">
    <div class="icon-wrap wrap-light"><svg class="icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg></div>
    <div class="label">A</div><div class="sublabel">盾牌 + 勾</div>
  </div>
  <div class="card">
    <div class="icon-wrap wrap-light"><svg class="icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/></svg></div>
    <div class="label">B</div><div class="sublabel">圆形 + 勾</div>
  </div>
  <div class="card">
    <div class="icon-wrap wrap-light"><svg class="icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6.5 21C3 17.5 3 12 6 8c2-2.5 5-4 8.5-4C18 4 21 7 21 10c0 2.5-1.5 4.5-3.5 5.5"/><path d="M12 22V12"/></svg></div>
    <div class="label">C</div><div class="sublabel">叶子</div>
  </div>
  <div class="card">
    <div class="icon-wrap wrap-light"><svg class="icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
    <div class="label">D</div><div class="sublabel">星星</div>
  </div>
</div>
</body>
</html>
