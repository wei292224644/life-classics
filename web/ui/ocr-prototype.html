<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>食品分析 — 原型 v2</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --spring: cubic-bezier(0.34,1.56,0.64,1);
  --ease:   cubic-bezier(0.16,1,0.3,1);
}

html, body {
  min-height: 100%;
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  background: #dbeafe;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: 40px;
  padding: 40px 24px 60px;
}

h2 {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #3b82f6;
  text-align: center;
}

.row {
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
  justify-content: center;
}

/* ─── 手机外壳 ─── */
.phone {
  width: 375px;
  height: 780px;
  border-radius: 50px;
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.08),
    0 40px 100px rgba(0,0,0,0.22);
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  background: #f8fafc;
}

/* ─── 状态栏 ─── */
.bar {
  height: 44px;
  padding: 14px 20px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
  font-weight: 600;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

/* ══════════════════════════════
   PAGE A — 分析中
══════════════════════════════ */
.analyzing {
  flex: 1;
  background: #f0f9ff;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 32px 48px;
}

.analyzing .bar { color: #0c4a6e; background: transparent; width: 100%; }

/* 中心扫描区 */
.scan-stage {
  margin-top: 24px;
  margin-bottom: 36px;
  position: relative;
  width: 200px;
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 外圈脉冲 */
.pulse-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 2px solid rgba(14,165,233,0.25);
  animation: pulse-out 2.4s ease-out infinite;
}
.pulse-ring:nth-child(2) { animation-delay: 0.8s; }
.pulse-ring:nth-child(3) { animation-delay: 1.6s; }

@keyframes pulse-out {
  0%   { transform: scale(0.6); opacity: 0.8; }
  100% { transform: scale(1.1); opacity: 0; }
}

/* 图片卡 */
.scan-card {
  width: 130px;
  height: 130px;
  border-radius: 24px;
  background: linear-gradient(135deg, #e0f2fe, #bae6fd);
  box-shadow: 0 12px 40px rgba(14,165,233,0.25);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  position: relative;
  overflow: hidden;
}
.scan-card-emoji { font-size: 36px; }
.scan-card-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: #0369a1;
  background: rgba(255,255,255,0.7);
  padding: 2px 8px;
  border-radius: 99px;
}

/* 扫描线 */
.scan-line {
  position: absolute;
  left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, #0ea5e9, transparent);
  box-shadow: 0 0 10px rgba(14,165,233,0.8);
  animation: sweep 2s ease-in-out infinite;
}
@keyframes sweep {
  0%   { top: 0; opacity: 0; }
  8%   { opacity: 1; }
  92%  { opacity: 1; }
  100% { top: 100%; opacity: 0; }
}

/* 标题区 */
.analyzing-title {
  font-size: 22px;
  font-weight: 800;
  color: #0c4a6e;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
  text-align: center;
}
.analyzing-sub {
  font-size: 13px;
  color: #64748b;
  text-align: center;
  margin-bottom: 40px;
  line-height: 1.6;
}

/* 步骤 — 纯文字，无卡片 */
.steps {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.step-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 13px 0;
  border-bottom: 1px solid rgba(14,165,233,0.1);
}
.step-row:last-child { border-bottom: none; }

.step-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-left: 4px;
}
.step-row.done  .step-dot { background: #22c55e; }
.step-row.now   .step-dot { background: #0ea5e9; animation: blink 1.2s ease-in-out infinite; }
.step-row.wait  .step-dot { background: #cbd5e1; }

@keyframes blink {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.4; transform: scale(0.7); }
}

.step-name {
  font-size: 14px;
  font-weight: 600;
  flex: 1;
  color: #0f172a;
}
.step-row.wait .step-name { color: #94a3b8; }

.step-state {
  font-size: 12px;
  font-weight: 500;
}
.step-row.done .step-state { color: #22c55e; }
.step-row.now  .step-state { color: #0ea5e9; }
.step-row.wait .step-state { color: #cbd5e1; }


/* ══════════════════════════════
   PAGE B — 结果（重设计）
══════════════════════════════ */
.result {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #f8fafc;
}

/* ── 深色 Hero ── */
.r-hero {
  background: #063d4f;
  padding: 0 28px 48px;
  flex-shrink: 0;
  position: relative;
}

/* 噪点纹理增加质感 */
.r-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.4;
  pointer-events: none;
}

/* 顶部光晕 */
.r-hero::after {
  content: '';
  position: absolute;
  top: -60px; left: 50%;
  transform: translateX(-50%);
  width: 280px; height: 200px;
  background: radial-gradient(ellipse, rgba(34,211,238,0.18) 0%, transparent 70%);
  pointer-events: none;
}

.r-bar {
  height: 44px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: relative;
  z-index: 2;
}
.r-back {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: rgba(255,255,255,0.7);
  cursor: pointer;
  flex-shrink: 0;
}
.r-name {
  font-size: 13px; font-weight: 500;
  color: rgba(255,255,255,0.5);
  flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  letter-spacing: 0.01em;
}

/* 分数区 */
.r-score-area {
  position: relative; z-index: 2;
  padding-top: 8px;
}
.r-score-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(34,211,238,0.7);
  margin-bottom: 2px;
}
.r-score-num {
  font-size: 104px; font-weight: 900;
  letter-spacing: -0.06em; line-height: 0.9;
  color: #ffffff;
  font-variant-numeric: tabular-nums;
}
.r-score-num span {
  font-size: 28px; font-weight: 400;
  letter-spacing: -0.02em;
  color: rgba(255,255,255,0.35);
  vertical-align: baseline;
}

/* 特征条 — 小白胶囊在暗底上 */
.r-traits {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-top: 16px;
}
.r-trait {
  font-size: 11px; font-weight: 600;
  padding: 4px 10px; border-radius: 99px;
  letter-spacing: 0.03em;
}
.rt-safe { background: rgba(34,197,94,0.2); color: #6ee7b7; }
.rt-warn { background: rgba(251,191,36,0.2); color: #fcd34d; }

/* 底部过渡 */
.r-wave {
  position: absolute;
  bottom: -1px; left: 0; right: 0;
  height: 32px;
  background: #f8fafc;
  border-radius: 32px 32px 0 0;
}

/* ── 内容区 ── */
.r-body {
  flex: 1;
  overflow-y: auto; overflow-x: hidden;
  scrollbar-width: none;
  padding: 24px 24px 100px;
}
.r-body::-webkit-scrollbar { display: none; }

/* 配料 — 内联行文风格 */
.r-section { margin-bottom: 28px; }
.r-sec-title {
  font-size: 9px; font-weight: 800;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: #94a3b8; margin-bottom: 12px;
}

.ingr-prose {
  font-size: 14px; font-weight: 500;
  color: #334155; line-height: 2;
  letter-spacing: 0.01em;
}
.ingr-prose .ig-safe { color: #0f172a; font-weight: 600; }
.ingr-prose .ig-warn {
  color: #92400e; font-weight: 700;
  background: rgba(251,191,36,0.18);
  border-radius: 4px; padding: 1px 4px;
}
.ingr-prose .ig-bad {
  color: #991b1b; font-weight: 700;
  background: rgba(239,68,68,0.12);
  border-radius: 4px; padding: 1px 4px;
}

/* 营养 — 进度条式 */
.nutr-bars { display: flex; flex-direction: column; gap: 14px; }
.nb-row { display: flex; flex-direction: column; gap: 5px; }
.nb-top {
  display: flex; justify-content: space-between; align-items: baseline;
}
.nb-name { font-size: 12px; color: #64748b; font-weight: 500; }
.nb-val {
  font-size: 16px; font-weight: 800;
  color: #0f172a; letter-spacing: -0.02em;
}
.nb-val small { font-size: 11px; font-weight: 400; color: #94a3b8; margin-left: 1px; }
.nb-track {
  height: 5px; background: #e2e8f0;
  border-radius: 99px; overflow: hidden;
}
.nb-fill {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, #0891b2, #22d3ee);
  transition: width 0.8s var(--ease);
}
.nb-fill.warn { background: linear-gradient(90deg, #f59e0b, #fcd34d); }
.nb-fill.high { background: linear-gradient(90deg, #ef4444, #f87171); }

/* ── 底部浮动栏 ── */
.r-bottom {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 14px 20px 28px;
  background: rgba(248,250,252,0.96);
  backdrop-filter: blur(20px);
  border-top: 1px solid #e2e8f0;
}
.r-btn {
  width: 100%; height: 54px;
  border-radius: 16px;
  background: #063d4f;
  color: #ffffff;
  font-size: 15px; font-weight: 700;
  letter-spacing: 0.02em;
  display: flex; align-items: center; justify-content: center;
  gap: 8px;
  border: none; cursor: pointer;
  transition: transform 0.12s var(--spring), opacity 0.12s;
}
.r-btn:active { transform: scale(0.98); opacity: 0.9; }
</style>
</head>
<body>

<h2>Life Classics — 食品分析 v2</h2>

<div class="row">

<!-- ══ 手机A：分析中 ══ -->
<div class="phone">
  <div class="analyzing">
    <div class="bar" style="color:#0c4a6e">
      <span>11:01</span><span>📶 🔋</span>
    </div>

    <div class="scan-stage">
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="scan-card">
        <div class="scan-card-emoji">🥫</div>
        <div class="scan-card-label">SCANNING</div>
        <div class="scan-line"></div>
      </div>
    </div>

    <div class="analyzing-title">正在分析</div>
    <div class="analyzing-sub">双通道识别中<br>请稍候片刻</div>

    <div class="steps">
      <div class="step-row done">
        <div class="step-dot"></div>
        <div class="step-name">图像视觉识别</div>
        <div class="step-state">完成</div>
      </div>
      <div class="step-row now">
        <div class="step-dot"></div>
        <div class="step-name">OCR 字符精确提取</div>
        <div class="step-state">进行中</div>
      </div>
      <div class="step-row wait">
        <div class="step-dot"></div>
        <div class="step-name">成分结构化</div>
        <div class="step-state">等待</div>
      </div>
      <div class="step-row wait">
        <div class="step-dot"></div>
        <div class="step-name">风险评估</div>
        <div class="step-state">等待</div>
      </div>
    </div>
  </div>
</div>

<!-- ══ 手机B：结果 ══ -->
<div class="phone" style="position:relative">
  <div class="result">

    <!-- 深色 Hero -->
    <div class="r-hero">
      <div class="r-bar">
        <div class="r-back">←</div>
        <div class="r-name">高纤燕麦棒（蓝莓味）</div>
      </div>
      <div class="r-score-area">
        <div class="r-score-label">综合评分</div>
        <div class="r-score-num">74<span> / 100</span></div>
        <div class="r-traits">
          <span class="r-trait rt-safe">高纤维</span>
          <span class="r-trait rt-safe">低钠</span>
          <span class="r-trait rt-safe">天然成分为主</span>
          <span class="r-trait rt-warn">2 项需关注</span>
        </div>
      </div>
      <div class="r-wave"></div>
    </div>

    <!-- 内容区 -->
    <div class="r-body">

      <!-- 配料：内联行文 -->
      <div class="r-section">
        <div class="r-sec-title">配料表</div>
        <div class="ingr-prose">
          <span class="ig-safe">燕麦</span>、
          <span class="ig-safe">全麦粉</span>、
          <span class="ig-safe">蓝莓干</span>、
          <span class="ig-safe">葵花籽油</span>、
          <span class="ig-warn">麦芽糖醇</span>、
          <span class="ig-warn">碳酸氢铵</span>、
          <span class="ig-safe">乳清蛋白</span>、
          <span class="ig-safe">维生素 E</span>、
          <span class="ig-safe">食盐</span>
        </div>
      </div>

      <!-- 营养：进度条 -->
      <div class="r-section">
        <div class="r-sec-title">营养成分 · 每 100g</div>
        <div class="nutr-bars">
          <div class="nb-row">
            <div class="nb-top">
              <span class="nb-name">热量</span>
              <span class="nb-val">389<small> kcal</small></span>
            </div>
            <div class="nb-track"><div class="nb-fill warn" style="width:78%"></div></div>
          </div>
          <div class="nb-row">
            <div class="nb-top">
              <span class="nb-name">蛋白质</span>
              <span class="nb-val">12.4<small> g</small></span>
            </div>
            <div class="nb-track"><div class="nb-fill" style="width:50%"></div></div>
          </div>
          <div class="nb-row">
            <div class="nb-top">
              <span class="nb-name">脂肪</span>
              <span class="nb-val">8.2<small> g</small></span>
            </div>
            <div class="nb-track"><div class="nb-fill" style="width:27%"></div></div>
          </div>
          <div class="nb-row">
            <div class="nb-top">
              <span class="nb-name">碳水化合物</span>
              <span class="nb-val">61.5<small> g</small></span>
            </div>
            <div class="nb-track"><div class="nb-fill warn" style="width:68%"></div></div>
          </div>
          <div class="nb-row">
            <div class="nb-top">
              <span class="nb-name">膳食纤维</span>
              <span class="nb-val">8.8<small> g</small></span>
            </div>
            <div class="nb-track"><div class="nb-fill" style="width:35%"></div></div>
          </div>
          <div class="nb-row">
            <div class="nb-top">
              <span class="nb-name">钠</span>
              <span class="nb-val">89<small> mg</small></span>
            </div>
            <div class="nb-track"><div class="nb-fill" style="width:9%"></div></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- 底部浮动栏 -->
  <div class="r-bottom">
    <button class="r-btn">✦ 问 AI 助手</button>
  </div>
</div>

</div><!-- /row -->

</body>
</html>
