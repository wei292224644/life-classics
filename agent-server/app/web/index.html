<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库查看器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: "hsl(var(--border))",
                        input: "hsl(var(--input))",
                        ring: "hsl(var(--ring))",
                        background: "hsl(var(--background))",
                        foreground: "hsl(var(--foreground))",
                        primary: {
                            DEFAULT: "hsl(var(--primary))",
                            foreground: "hsl(var(--primary-foreground))",
                        },
                        secondary: {
                            DEFAULT: "hsl(var(--secondary))",
                            foreground: "hsl(var(--secondary-foreground))",
                        },
                        destructive: {
                            DEFAULT: "hsl(var(--destructive))",
                            foreground: "hsl(var(--destructive-foreground))",
                        },
                        muted: {
                            DEFAULT: "hsl(var(--muted))",
                            foreground: "hsl(var(--muted-foreground))",
                        },
                        accent: {
                            DEFAULT: "hsl(var(--accent))",
                            foreground: "hsl(var(--accent-foreground))",
                        },
                        popover: {
                            DEFAULT: "hsl(var(--popover))",
                            foreground: "hsl(var(--popover-foreground))",
                        },
                        card: {
                            DEFAULT: "hsl(var(--card))",
                            foreground: "hsl(var(--card-foreground))",
                        },
                    },
                },
            },
        }
    </script>
    <style>
        :root {
            --background: 0 0% 100%;
            --foreground: 222.2 84% 4.9%;
            --card: 0 0% 100%;
            --card-foreground: 222.2 84% 4.9%;
            --popover: 0 0% 100%;
            --popover-foreground: 222.2 84% 4.9%;
            --primary: 222.2 47.4% 11.2%;
            --primary-foreground: 210 40% 98%;
            --secondary: 210 40% 96.1%;
            --secondary-foreground: 222.2 47.4% 11.2%;
            --muted: 210 40% 96.1%;
            --muted-foreground: 215.4 16.3% 46.9%;
            --accent: 210 40% 96.1%;
            --accent-foreground: 222.2 47.4% 11.2%;
            --destructive: 0 84.2% 60.2%;
            --destructive-foreground: 210 40% 98%;
            --border: 214.3 31.8% 91.4%;
            --input: 214.3 31.8% 91.4%;
            --ring: 222.2 84% 4.9%;
        }
        .dark {
            --background: 222.2 84% 4.9%;
            --foreground: 210 40% 98%;
            --card: 222.2 84% 4.9%;
            --card-foreground: 210 40% 98%;
            --popover: 222.2 84% 4.9%;
            --popover-foreground: 210 40% 98%;
            --primary: 210 40% 98%;
            --primary-foreground: 222.2 47.4% 11.2%;
            --secondary: 217.2 32.6% 17.5%;
            --secondary-foreground: 210 40% 98%;
            --muted: 217.2 32.6% 17.5%;
            --muted-foreground: 215 20.2% 65.1%;
            --accent: 217.2 32.6% 17.5%;
            --accent-foreground: 210 40% 98%;
            --destructive: 0 62.8% 30.6%;
            --destructive-foreground: 210 40% 98%;
            --border: 217.2 32.6% 17.5%;
            --input: 217.2 32.6% 17.5%;
            --ring: 212.7 26.8% 83.9%;
        }
    </style>
</head>
<body class="bg-background text-foreground">
    <div class="min-h-screen">
        <!-- Header -->
        <header class="border-b border-border bg-card">
            <div class="container mx-auto px-4 py-4">
                <div class="flex items-center justify-between">
                    <h1 class="text-2xl font-bold">知识库查看器</h1>
                    <div class="flex items-center gap-4">
                        <button id="refreshBtn" class="px-4 py-2 bg-primary text-primary-foreground rounded-md hover:bg-primary/90 transition-colors">
                            刷新
                        </button>
                        <div id="infoBadge" class="px-3 py-1 bg-secondary text-secondary-foreground rounded-full text-sm">
                            加载中...
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Tabs -->
        <div class="border-b border-border bg-card">
            <div class="container mx-auto px-4">
                <div class="flex gap-1">
                    <button id="tabDocuments" class="tab-btn px-4 py-3 border-b-2 border-primary text-primary font-medium">
                        文档列表
                    </button>
                    <button id="tabChunks" class="tab-btn px-4 py-3 border-b-2 border-transparent text-muted-foreground hover:text-foreground">
                        Chunks 列表
                    </button>
                </div>
            </div>
        </div>

        <!-- Filters (only for chunks view) -->
        <div id="filtersContainer" class="border-b border-border bg-card hidden">
            <div class="container mx-auto px-4 py-4">
                <div class="flex flex-wrap gap-4 items-end">
                    <div class="flex-1 min-w-[200px]">
                        <label class="block text-sm font-medium mb-2">文档 ID</label>
                        <select id="docIdFilter" class="w-full px-3 py-2 border border-input rounded-md bg-background">
                            <option value="">全部</option>
                        </select>
                    </div>
                    <div class="flex-1 min-w-[200px]">
                        <label class="block text-sm font-medium mb-2">内容类型</label>
                        <select id="contentTypeFilter" class="w-full px-3 py-2 border border-input rounded-md bg-background">
                            <option value="">全部</option>
                        </select>
                    </div>
                    <div class="flex gap-2">
                        <button id="filterBtn" class="px-4 py-2 bg-primary text-primary-foreground rounded-md hover:bg-primary/90 transition-colors">
                            筛选
                        </button>
                        <button id="clearFilterBtn" class="px-4 py-2 bg-secondary text-secondary-foreground rounded-md hover:bg-secondary/80 transition-colors">
                            清除
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <main class="container mx-auto px-4 py-6">
            <!-- Loading State -->
            <div id="loadingState" class="text-center py-12">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
                <p class="mt-4 text-muted-foreground">加载中...</p>
            </div>

            <!-- Error State -->
            <div id="errorState" class="hidden text-center py-12">
                <div class="inline-block p-4 bg-destructive/10 text-destructive rounded-md">
                    <p id="errorMessage"></p>
                </div>
            </div>

            <!-- Documents List -->
            <div id="documentsContainer" class="hidden space-y-4">
                <div id="documentsList" class="space-y-4"></div>
            </div>

            <!-- Chunks List -->
            <div id="chunksContainer" class="hidden space-y-4">
                <!-- Pagination Info -->
                <div class="flex items-center justify-between text-sm text-muted-foreground mb-4">
                    <div id="paginationInfo"></div>
                    <div class="flex gap-2">
                        <button id="prevBtn" class="px-3 py-1 border border-input rounded-md hover:bg-accent disabled:opacity-50 disabled:cursor-not-allowed">
                            上一页
                        </button>
                        <button id="nextBtn" class="px-3 py-1 border border-input rounded-md hover:bg-accent disabled:opacity-50 disabled:cursor-not-allowed">
                            下一页
                        </button>
                    </div>
                </div>

                <!-- Chunks Grid -->
                <div id="chunksList" class="space-y-4"></div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = '/api/doc';
        let currentPage = 0;
        const pageSize = 20;
        let currentFilters = {};
        let currentView = 'documents'; // 'documents' or 'chunks'

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadInfo();
            loadDocuments();
            
            // 标签页切换
            document.getElementById('tabDocuments').addEventListener('click', () => {
                switchView('documents');
            });
            
            document.getElementById('tabChunks').addEventListener('click', () => {
                switchView('chunks');
            });
            
            document.getElementById('refreshBtn').addEventListener('click', () => {
                loadInfo();
                if (currentView === 'documents') {
                    loadDocuments();
                } else {
                    loadChunks();
                }
            });
            
            document.getElementById('filterBtn').addEventListener('click', () => {
                currentPage = 0;
                applyFilters();
            });
            
            document.getElementById('clearFilterBtn').addEventListener('click', () => {
                document.getElementById('docIdFilter').value = '';
                document.getElementById('contentTypeFilter').value = '';
                currentPage = 0;
                currentFilters = {};
                loadChunks();
            });
            
            document.getElementById('prevBtn').addEventListener('click', () => {
                if (currentPage > 0) {
                    currentPage--;
                    loadChunks();
                }
            });
            
            document.getElementById('nextBtn').addEventListener('click', () => {
                currentPage++;
                loadChunks();
            });
        });

        function switchView(view) {
            currentView = view;
            
            // 更新标签页样式
            const tabDocuments = document.getElementById('tabDocuments');
            const tabChunks = document.getElementById('tabChunks');
            
            if (view === 'documents') {
                tabDocuments.classList.add('border-primary', 'text-primary', 'font-medium');
                tabDocuments.classList.remove('border-transparent', 'text-muted-foreground');
                tabChunks.classList.remove('border-primary', 'text-primary', 'font-medium');
                tabChunks.classList.add('border-transparent', 'text-muted-foreground');
                
                document.getElementById('filtersContainer').classList.add('hidden');
                document.getElementById('documentsContainer').classList.remove('hidden');
                document.getElementById('chunksContainer').classList.add('hidden');
                loadDocuments();
            } else {
                tabChunks.classList.add('border-primary', 'text-primary', 'font-medium');
                tabChunks.classList.remove('border-transparent', 'text-muted-foreground');
                tabDocuments.classList.remove('border-primary', 'text-primary', 'font-medium');
                tabDocuments.classList.add('border-transparent', 'text-muted-foreground');
                
                document.getElementById('filtersContainer').classList.remove('hidden');
                document.getElementById('documentsContainer').classList.add('hidden');
                document.getElementById('chunksContainer').classList.remove('hidden');
                loadChunks();
            }
        }

        async function loadInfo() {
            try {
                const response = await fetch(`${API_BASE}/chunks/info`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    document.getElementById('infoBadge').textContent = 
                        `总计: ${data.total_chunks} 个 chunks, ${data.total_doc_ids} 个文档`;
                    
                    // 填充文档 ID 筛选器
                    const docIdSelect = document.getElementById('docIdFilter');
                    docIdSelect.innerHTML = '<option value="">全部</option>';
                    data.doc_ids.forEach(docId => {
                        const option = document.createElement('option');
                        option.value = docId;
                        option.textContent = docId;
                        docIdSelect.appendChild(option);
                    });
                    
                    // 填充内容类型筛选器
                    const contentTypeSelect = document.getElementById('contentTypeFilter');
                    contentTypeSelect.innerHTML = '<option value="">全部</option>';
                    Object.keys(data.content_types).forEach(contentType => {
                        const option = document.createElement('option');
                        option.value = contentType;
                        option.textContent = `${contentType} (${data.content_types[contentType]})`;
                        contentTypeSelect.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('加载信息失败:', error);
            }
        }

        function applyFilters() {
            const docId = document.getElementById('docIdFilter').value;
            const contentType = document.getElementById('contentTypeFilter').value;
            
            currentFilters = {};
            if (docId) currentFilters.doc_id = docId;
            if (contentType) currentFilters.content_type = contentType;
            
            loadChunks();
        }

        async function loadChunks() {
            showLoading();
            
            try {
                const params = new URLSearchParams({
                    limit: pageSize.toString(),
                    offset: (currentPage * pageSize).toString(),
                    ...currentFilters
                });
                
                const response = await fetch(`${API_BASE}/chunks?${params}`);
                const data = await response.json();
                
                if (response.ok) {
                    displayChunks(data);
                } else {
                    showError(data.detail || '加载失败');
                }
            } catch (error) {
                showError(`加载失败: ${error.message}`);
            }
        }

        function showLoading() {
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('errorState').classList.add('hidden');
            document.getElementById('chunksContainer').classList.add('hidden');
        }

        function showError(message) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
            document.getElementById('chunksContainer').classList.add('hidden');
            document.getElementById('errorMessage').textContent = message;
        }

        function displayChunks(data) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('errorState').classList.add('hidden');
            document.getElementById('chunksContainer').classList.remove('hidden');
            
            const chunksList = document.getElementById('chunksList');
            chunksList.innerHTML = '';
            
            if (data.chunks.length === 0) {
                chunksList.innerHTML = '<div class="text-center py-12 text-muted-foreground">暂无数据</div>';
                return;
            }
            
            // 显示分页信息
            const total = data.total || data.chunks.length;
            const start = currentPage * pageSize + 1;
            const end = Math.min(start + data.chunks.length - 1, total);
            document.getElementById('paginationInfo').textContent = 
                `显示 ${start}-${end} / 共 ${total} 条`;
            
            // 更新分页按钮
            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').disabled = data.chunks.length < pageSize;
            
            // 渲染 chunks
            data.chunks.forEach(chunk => {
                const chunkCard = createChunkCard(chunk);
                chunksList.appendChild(chunkCard);
            });
        }

        function createChunkCard(chunk) {
            const card = document.createElement('div');
            card.className = 'border border-border rounded-lg bg-card p-4 hover:shadow-md transition-shadow';
            
            const metadata = chunk.metadata || {};
            const docId = metadata.doc_id || '未知';
            const contentType = metadata.content_type || '未知';
            const sectionPath = metadata.section_path || [];
            const docTitle = metadata.doc_title || docId;
            
            card.innerHTML = `
                <div class="flex items-start justify-between mb-3">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="px-2 py-1 bg-primary/10 text-primary text-xs rounded-md">${contentType}</span>
                            <span class="text-sm text-muted-foreground">${docId}</span>
                        </div>
                        <h3 class="font-semibold text-sm">${docTitle}</h3>
                        ${sectionPath.length > 0 ? `
                            <div class="text-xs text-muted-foreground mt-1">
                                路径: ${sectionPath.join(' > ')}
                            </div>
                        ` : ''}
                    </div>
                    <button class="copy-btn px-2 py-1 text-xs border border-input rounded hover:bg-accent" data-id="${chunk.id}">
                        复制 ID
                    </button>
                </div>
                <div class="mt-3 p-3 bg-muted rounded-md">
                    <p class="text-sm whitespace-pre-wrap break-words">${escapeHtml(chunk.content.substring(0, 500))}${chunk.content.length > 500 ? '...' : ''}</p>
                </div>
                <details class="mt-3">
                    <summary class="text-xs text-muted-foreground cursor-pointer hover:text-foreground">查看元数据</summary>
                    <pre class="mt-2 p-2 bg-muted rounded text-xs overflow-auto">${JSON.stringify(metadata, null, 2)}</pre>
                </details>
            `;
            
            // 添加复制功能
            const copyBtn = card.querySelector('.copy-btn');
            copyBtn.addEventListener('click', () => {
                navigator.clipboard.writeText(chunk.id);
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '已复制!';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            });
            
            return card;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadDocuments() {
            showLoading();
            
            try {
                const response = await fetch(`${API_BASE}/documents`);
                const data = await response.json();
                
                if (response.ok) {
                    displayDocuments(data);
                } else {
                    showError(data.detail || '加载失败');
                }
            } catch (error) {
                showError(`加载失败: ${error.message}`);
            }
        }

        function displayDocuments(data) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('errorState').classList.add('hidden');
            document.getElementById('documentsContainer').classList.remove('hidden');
            
            const documentsList = document.getElementById('documentsList');
            documentsList.innerHTML = '';
            
            if (data.documents.length === 0) {
                documentsList.innerHTML = '<div class="text-center py-12 text-muted-foreground">暂无文档</div>';
                return;
            }
            
            // 显示统计信息
            const statsDiv = document.createElement('div');
            statsDiv.className = 'mb-4 p-4 bg-muted rounded-lg';
            statsDiv.innerHTML = `<div class="text-sm text-muted-foreground">共 ${data.total} 个文档</div>`;
            documentsList.appendChild(statsDiv);
            
            // 渲染文档列表
            data.documents.forEach(doc => {
                const docCard = createDocumentCard(doc);
                documentsList.appendChild(docCard);
            });
        }

        function createDocumentCard(doc) {
            const card = document.createElement('div');
            card.className = 'border border-border rounded-lg bg-card p-6 hover:shadow-md transition-shadow';
            
            // 内容类型标签
            const contentTypesHtml = Object.entries(doc.content_types)
                .map(([type, count]) => `<span class="px-2 py-1 bg-primary/10 text-primary text-xs rounded-md">${type}: ${count}</span>`)
                .join(' ');
            
            card.innerHTML = `
                <div class="flex items-start justify-between mb-4">
                    <div class="flex-1">
                        <h3 class="text-lg font-semibold mb-2">${escapeHtml(doc.doc_title)}</h3>
                        <div class="flex items-center gap-4 text-sm text-muted-foreground mb-3">
                            <span>文档 ID: <code class="px-1 py-0.5 bg-muted rounded">${escapeHtml(doc.doc_id)}</code></span>
                            ${doc.source ? `<span>来源: ${escapeHtml(doc.source)}</span>` : ''}
                        </div>
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-sm font-medium">Chunks: ${doc.chunks_count}</span>
                        </div>
                        <div class="flex flex-wrap gap-2 mt-3">
                            ${contentTypesHtml || '<span class="text-xs text-muted-foreground">无内容类型信息</span>'}
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button class="view-chunks-btn px-3 py-1 text-sm border border-input rounded-md hover:bg-accent" data-doc-id="${doc.doc_id}">
                            查看 Chunks
                        </button>
                    </div>
                </div>
            `;
            
            // 添加查看 chunks 功能
            const viewBtn = card.querySelector('.view-chunks-btn');
            viewBtn.addEventListener('click', () => {
                document.getElementById('docIdFilter').value = doc.doc_id;
                switchView('chunks');
                currentPage = 0;
                applyFilters();
            });
            
            return card;
        }
    </script>
</body>
</html>
