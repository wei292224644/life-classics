<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}知识库查看器{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: "hsl(var(--border))",
                        input: "hsl(var(--input))",
                        ring: "hsl(var(--ring))",
                        background: "hsl(var(--background))",
                        foreground: "hsl(var(--foreground))",
                        primary: {
                            DEFAULT: "hsl(var(--primary))",
                            foreground: "hsl(var(--primary-foreground))",
                        },
                        secondary: {
                            DEFAULT: "hsl(var(--secondary))",
                            foreground: "hsl(var(--secondary-foreground))",
                        },
                        destructive: {
                            DEFAULT: "hsl(var(--destructive))",
                            foreground: "hsl(var(--destructive-foreground))",
                        },
                        muted: {
                            DEFAULT: "hsl(var(--muted))",
                            foreground: "hsl(var(--muted-foreground))",
                        },
                        accent: {
                            DEFAULT: "hsl(var(--accent))",
                            foreground: "hsl(var(--accent-foreground))",
                        },
                        popover: {
                            DEFAULT: "hsl(var(--popover))",
                            foreground: "hsl(var(--popover-foreground))",
                        },
                        card: {
                            DEFAULT: "hsl(var(--card))",
                            foreground: "hsl(var(--card-foreground))",
                        },
                    },
                },
            },
        }
    </script>
    <style>
        :root {
            --background: 0 0% 100%;
            --foreground: 222.2 84% 4.9%;
            --card: 0 0% 100%;
            --card-foreground: 222.2 84% 4.9%;
            --popover: 0 0% 100%;
            --popover-foreground: 222.2 84% 4.9%;
            --primary: 222.2 47.4% 11.2%;
            --primary-foreground: 210 40% 98%;
            --secondary: 210 40% 96.1%;
            --secondary-foreground: 222.2 47.4% 11.2%;
            --muted: 210 40% 96.1%;
            --muted-foreground: 215.4 16.3% 46.9%;
            --accent: 210 40% 96.1%;
            --accent-foreground: 222.2 47.4% 11.2%;
            --destructive: 0 84.2% 60.2%;
            --destructive-foreground: 210 40% 98%;
            --border: 214.3 31.8% 91.4%;
            --input: 214.3 31.8% 91.4%;
            --ring: 222.2 84% 4.9%;
        }
        .dark {
            --background: 222.2 84% 4.9%;
            --foreground: 210 40% 98%;
            --card: 222.2 84% 4.9%;
            --card-foreground: 210 40% 98%;
            --popover: 222.2 84% 4.9%;
            --popover-foreground: 210 40% 98%;
            --primary: 210 40% 98%;
            --primary-foreground: 222.2 47.4% 11.2%;
            --secondary: 217.2 32.6% 17.5%;
            --secondary-foreground: 210 40% 98%;
            --muted: 217.2 32.6% 17.5%;
            --muted-foreground: 215 20.2% 65.1%;
            --accent: 217.2 32.6% 17.5%;
            --accent-foreground: 210 40% 98%;
            --destructive: 0 62.8% 30.6%;
            --destructive-foreground: 210 40% 98%;
            --border: 217.2 32.6% 17.5%;
            --input: 217.2 32.6% 17.5%;
            --ring: 212.7 26.8% 83.9%;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-background text-foreground">
    <div class="min-h-screen">
        <!-- Header -->
        <header class="border-b border-border bg-card">
            <div class="container mx-auto px-4 py-4">
                <div class="flex items-center justify-between">
                    <h1 class="text-2xl font-bold">
                        <a href="/" class="hover:opacity-80 transition-opacity">知识库查看器</a>
                    </h1>
                    <div class="flex items-center gap-4">
                        <button id="refreshBtn" class="px-4 py-2 bg-primary text-primary-foreground rounded-md hover:bg-primary/90 transition-colors">
                            刷新
                        </button>
                        <div id="infoBadge" class="px-3 py-1 bg-secondary text-secondary-foreground rounded-full text-sm">
                            加载中...
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="border-b border-border bg-card">
            <div class="container mx-auto px-4">
                <div class="flex gap-1">
                    <a href="/documents" class="nav-link px-4 py-3 border-b-2 border-transparent text-muted-foreground hover:text-foreground transition-colors">
                        文档列表
                    </a>
                    <a href="/chunks" class="nav-link px-4 py-3 border-b-2 border-transparent text-muted-foreground hover:text-foreground transition-colors">
                        Chunks 列表
                    </a>
                    <a href="/upload" class="nav-link px-4 py-3 border-b-2 border-transparent text-muted-foreground hover:text-foreground transition-colors">
                        上传文档
                    </a>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="container mx-auto px-4 py-6">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        const API_BASE = '/api/doc';
        
        // 更新导航链接的激活状态
        function updateNavActive() {
            const path = window.location.pathname;
            const navLinks = document.querySelectorAll('.nav-link');
            navLinks.forEach(link => {
                const href = link.getAttribute('href');
                if (path === href || (path === '/' && href === '/documents')) {
                    link.classList.add('border-primary', 'text-primary', 'font-medium');
                    link.classList.remove('border-transparent', 'text-muted-foreground');
                } else {
                    link.classList.remove('border-primary', 'text-primary', 'font-medium');
                    link.classList.add('border-transparent', 'text-muted-foreground');
                }
            });
        }

        // 加载统计信息
        async function loadInfo() {
            try {
                const response = await fetch(`${API_BASE}/chunks/info`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    const infoBadge = document.getElementById('infoBadge');
                    if (infoBadge) {
                        infoBadge.textContent = 
                            `总计: ${data.total_chunks} 个 chunks, ${data.total_doc_ids} 个文档`;
                    }
                }
            } catch (error) {
                console.error('加载信息失败:', error);
            }
        }

        // 页面加载时更新导航状态和加载信息
        document.addEventListener('DOMContentLoaded', () => {
            updateNavActive();
            loadInfo();
            
            const refreshBtn = document.getElementById('refreshBtn');
            if (refreshBtn) {
                refreshBtn.addEventListener('click', () => {
                    loadInfo();
                    if (typeof refreshPage === 'function') {
                        refreshPage();
                    }
                });
            }
        });
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
