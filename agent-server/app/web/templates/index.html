{% extends "layout.html" %}

{% block title %}知识库查看器{% endblock %}

{% block content %}
    <div class="text-center py-12">
        <h2 class="text-2xl font-bold mb-4">欢迎使用知识库查看器</h2>
        <p class="text-muted-foreground mb-8">请选择要查看的内容</p>
        <div class="flex gap-4 justify-center flex-wrap">
            <a href="/upload" class="px-6 py-3 bg-primary text-primary-foreground rounded-md hover:bg-primary/90 transition-colors">
                上传文档
            </a>
            <a href="/documents" class="px-6 py-3 bg-secondary text-secondary-foreground rounded-md hover:bg-secondary/80 transition-colors">
                查看文档列表
            </a>
            <a href="/chunks" class="px-6 py-3 bg-secondary text-secondary-foreground rounded-md hover:bg-secondary/80 transition-colors">
                查看 Chunks 列表
            </a>
        </div>
    </div>
{% endblock %}
