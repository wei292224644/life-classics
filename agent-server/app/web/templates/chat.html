{% extends "layout.html" %}

{% block title %}知识库对话 - 知识库查看器{% endblock %}

{% block content %}
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">知识库对话</h1>
        
        <!-- 对话区域 -->
        <div class="border border-border rounded-lg bg-card mb-4" style="height: 600px; display: flex; flex-direction: column;">
            <!-- 消息列表 -->
            <div id="messagesContainer" class="flex-1 overflow-y-auto p-4 space-y-4">
                <div class="text-center text-muted-foreground py-8">
                    <p>开始对话，我会基于知识库内容回答您的问题</p>
                </div>
            </div>
            
            <!-- 输入区域 -->
            <div class="border-t border-border p-4">
                <div class="flex gap-2">
                    <input 
                        type="text" 
                        id="messageInput" 
                        placeholder="输入您的问题..." 
                        class="flex-1 px-4 py-2 border border-input rounded-md bg-background focus:outline-none focus:ring-2 focus:ring-primary"
                    />
                    <button 
                        id="sendBtn" 
                        class="px-6 py-2 bg-primary text-primary-foreground rounded-md hover:bg-primary/90 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                        发送
                    </button>
                </div>
                <div class="flex items-center gap-4 mt-2">
                    <div class="flex items-center gap-2">
                        <input 
                            type="checkbox" 
                            id="useRerank" 
                            class="w-4 h-4"
                            checked
                        />
                        <label for="useRerank" class="text-sm text-muted-foreground">使用重排序</label>
                    </div>
                    <div class="flex items-center gap-2">
                        <label for="topK" class="text-sm text-muted-foreground">检索数量:</label>
                        <input 
                            type="number" 
                            id="topK" 
                            value="5" 
                            min="1" 
                            max="20"
                            class="w-20 px-2 py-1 border border-input rounded-md bg-background text-sm"
                        />
                    </div>
                    <button 
                        id="clearBtn" 
                        class="ml-auto px-4 py-1 text-sm text-muted-foreground hover:text-foreground transition-colors"
                    >
                        清空对话
                    </button>
                </div>
            </div>
        </div>
    </div>
{% endblock %}

{% block extra_scripts %}
<script>
    let conversationHistory = [];

    function addMessage(role, content, sources = null) {
        const messagesContainer = document.getElementById('messagesContainer');
        
        // 移除初始提示
        const initialPrompt = messagesContainer.querySelector('.text-center');
        if (initialPrompt) {
            initialPrompt.remove();
        }

        const messageDiv = document.createElement('div');
        messageDiv.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
        
        const messageContent = document.createElement('div');
        messageContent.className = `max-w-[80%] rounded-lg p-4 ${
            role === 'user' 
                ? 'bg-primary text-primary-foreground' 
                : 'bg-muted'
        }`;
        
        if (role === 'user') {
            messageContent.innerHTML = `<p class="whitespace-pre-wrap">${escapeHtml(content)}</p>`;
        } else {
            let html = `<p class="whitespace-pre-wrap mb-2">${escapeHtml(content)}</p>`;
            
            // 如果有来源，显示来源信息
            if (sources && sources.length > 0) {
                html += `<details class="mt-3">
                    <summary class="text-xs cursor-pointer hover:opacity-80">查看来源 (${sources.length})</summary>
                    <div class="mt-2 space-y-2 text-xs">`;
                
                sources.forEach((source, index) => {
                    const metadata = source.metadata || {};
                    const docTitle = metadata.doc_title || metadata.doc_id || '未知文档';
                    html += `
                        <div class="p-2 bg-background rounded border border-border">
                            <div class="font-medium mb-1">来源 ${index + 1}: ${escapeHtml(docTitle)}</div>
                            <div class="text-muted-foreground line-clamp-2">${escapeHtml(source.content.substring(0, 200))}...</div>
                        </div>
                    `;
                });
                
                html += `</div></details>`;
            }
            
            messageContent.innerHTML = html;
        }
        
        messageDiv.appendChild(messageContent);
        messagesContainer.appendChild(messageDiv);
        
        // 滚动到底部
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function addLoadingMessage() {
        const messagesContainer = document.getElementById('messagesContainer');
        const loadingDiv = document.createElement('div');
        loadingDiv.id = 'loadingMessage';
        loadingDiv.className = 'flex justify-start';
        loadingDiv.innerHTML = `
            <div class="bg-muted rounded-lg p-4">
                <div class="flex items-center gap-2">
                    <div class="animate-spin rounded-full h-4 w-4 border-b-2 border-primary"></div>
                    <span class="text-sm text-muted-foreground">正在思考...</span>
                </div>
            </div>
        `;
        messagesContainer.appendChild(loadingDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function removeLoadingMessage() {
        const loadingMessage = document.getElementById('loadingMessage');
        if (loadingMessage) {
            loadingMessage.remove();
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function addStreamingMessage() {
        const messagesContainer = document.getElementById('messagesContainer');
        
        // 移除初始提示
        const initialPrompt = messagesContainer.querySelector('.text-center');
        if (initialPrompt) {
            initialPrompt.remove();
        }

        const messageDiv = document.createElement('div');
        messageDiv.id = 'streamingMessage';
        messageDiv.className = 'flex justify-start';
        
        const messageContent = document.createElement('div');
        messageContent.className = 'max-w-[80%] rounded-lg p-4 bg-muted';
        messageContent.innerHTML = '<p class="whitespace-pre-wrap"></p><div id="streamingSources" class="mt-3 hidden"></div>';
        
        messageDiv.appendChild(messageContent);
        messagesContainer.appendChild(messageDiv);
        
        // 滚动到底部
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
        
        return messageContent.querySelector('p');
    }

    function updateStreamingMessage(text, sources = null) {
        const streamingP = document.querySelector('#streamingMessage p');
        if (streamingP) {
            streamingP.textContent = text;
            
            // 如果有来源，更新来源信息
            if (sources && sources.length > 0) {
                const sourcesDiv = document.getElementById('streamingSources');
                if (sourcesDiv) {
                    sourcesDiv.className = 'mt-3';
                    sourcesDiv.innerHTML = `
                        <details>
                            <summary class="text-xs cursor-pointer hover:opacity-80">查看来源 (${sources.length})</summary>
                            <div class="mt-2 space-y-2 text-xs">
                                ${sources.map((source, index) => {
                                    const metadata = source.metadata || {};
                                    const docTitle = metadata.doc_title || metadata.doc_id || '未知文档';
                                    return `
                                        <div class="p-2 bg-background rounded border border-border">
                                            <div class="font-medium mb-1">来源 ${index + 1}: ${escapeHtml(docTitle)}</div>
                                            <div class="text-muted-foreground line-clamp-2">${escapeHtml(source.content.substring(0, 200))}...</div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </details>
                    `;
                }
            }
        }
        
        // 滚动到底部
        const messagesContainer = document.getElementById('messagesContainer');
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function finalizeStreamingMessage(fullText, sources = null) {
        const streamingMessage = document.getElementById('streamingMessage');
        if (streamingMessage) {
            streamingMessage.id = ''; // 移除 ID，使其成为普通消息
        }
        return fullText;
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const message = input.value.trim();
        
        if (!message) {
            return;
        }

        // 禁用输入和按钮
        input.disabled = true;
        document.getElementById('sendBtn').disabled = true;

        // 添加用户消息
        addMessage('user', message);
        conversationHistory.push({ role: 'user', content: message });
        
        // 清空输入框
        input.value = '';

        try {
            const topK = parseInt(document.getElementById('topK').value) || 5;
            const useRerank = document.getElementById('useRerank').checked;

            // 1. 先创建会话
            const startResponse = await fetch(`${API_BASE}/chat/stream/start`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    message: message,
                    top_k: topK,
                    use_rerank: useRerank,
                    conversation_history: conversationHistory.slice(0, -1), // 不包含当前消息
                }),
            });

            if (!startResponse.ok) {
                const errorData = await startResponse.json();
                throw new Error(errorData.detail || '创建会话失败');
            }

            const { session_id } = await startResponse.json();

            // 2. 使用 EventSource 连接流式端点
            addStreamingMessage();
            let fullResponse = '';
            let sources = null;

            await new Promise((resolve, reject) => {
                const eventSource = new EventSource(`${API_BASE}/chat/stream/${session_id}`);

                eventSource.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        
                        if (data.type === 'sources') {
                            sources = JSON.parse(data.data);
                        } else if (data.type === 'chunk') {
                            fullResponse += data.data;
                            updateStreamingMessage(fullResponse, sources);
                        } else if (data.type === 'done') {
                            fullResponse = data.data;
                            updateStreamingMessage(fullResponse, sources);
                            eventSource.close();
                            finalizeStreamingMessage(fullResponse, sources);
                            conversationHistory.push({ role: 'assistant', content: fullResponse });
                            resolve();
                        } else if (data.type === 'error') {
                            eventSource.close();
                            reject(new Error(data.data));
                        }
                    } catch (e) {
                        console.error('解析 SSE 数据失败:', e, event.data);
                    }
                };

                eventSource.onerror = (error) => {
                    eventSource.close();
                    reject(new Error('连接失败或中断'));
                };
            });

        } catch (error) {
            // 移除流式消息容器
            const streamingMessage = document.getElementById('streamingMessage');
            if (streamingMessage) {
                streamingMessage.remove();
            }
            addMessage('assistant', `错误: ${error.message}`);
        } finally {
            // 恢复输入和按钮
            input.disabled = false;
            document.getElementById('sendBtn').disabled = false;
            input.focus();
        }
    }

    function clearConversation() {
        if (confirm('确定要清空对话历史吗？')) {
            conversationHistory = [];
            const messagesContainer = document.getElementById('messagesContainer');
            messagesContainer.innerHTML = `
                <div class="text-center text-muted-foreground py-8">
                    <p>开始对话，我会基于知识库内容回答您的问题</p>
                </div>
            `;
        }
    }

    // 页面加载时初始化
    document.addEventListener('DOMContentLoaded', () => {
        // 发送按钮
        document.getElementById('sendBtn').addEventListener('click', sendMessage);

        // 清空按钮
        document.getElementById('clearBtn').addEventListener('click', clearConversation);

        // 输入框回车键发送
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 聚焦输入框
        document.getElementById('messageInput').focus();
    });
</script>
{% endblock %}
