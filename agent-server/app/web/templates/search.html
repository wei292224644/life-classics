{% extends "layout.html" %}

{% block title %}检索测试 - 知识库查看器{% endblock %}

{% block content %}
    <!-- 检索测试区域 -->
    <div class="mb-6 border border-border rounded-lg bg-card p-6">
        <h2 class="text-xl font-semibold mb-4">检索测试</h2>
        
        <!-- 搜索表单 -->
        <div class="space-y-4">
            <div class="flex gap-4 items-end">
                <div class="flex-1">
                    <label for="searchQuery" class="block text-sm font-medium mb-2">搜索查询</label>
                    <input 
                        type="text" 
                        id="searchQuery" 
                        placeholder="输入要搜索的内容..." 
                        class="w-full px-4 py-2 border border-input rounded-md bg-background focus:outline-none focus:ring-2 focus:ring-primary"
                    />
                </div>
                <div class="w-32">
                    <label for="topK" class="block text-sm font-medium mb-2">返回数量</label>
                    <input 
                        type="number" 
                        id="topK" 
                        value="10" 
                        min="1" 
                        max="50"
                        class="w-full px-4 py-2 border border-input rounded-md bg-background focus:outline-none focus:ring-2 focus:ring-primary"
                    />
                </div>
                <div class="flex items-center gap-2">
                    <input 
                        type="checkbox" 
                        id="useRerank" 
                        class="w-4 h-4"
                    />
                    <label for="useRerank" class="text-sm">使用重排序</label>
                </div>
                <button 
                    id="searchBtn" 
                    class="px-6 py-2 bg-primary text-primary-foreground rounded-md hover:bg-primary/90 transition-colors"
                >
                    搜索
                </button>
            </div>
        </div>

        <!-- 搜索结果区域 -->
        <div id="searchResultsContainer" class="hidden mt-6">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-semibold">搜索结果</h3>
                <span id="searchResultsCount" class="text-sm text-muted-foreground"></span>
            </div>
            <div id="searchResults" class="space-y-4"></div>
        </div>

        <!-- 搜索加载状态 -->
        <div id="searchLoadingState" class="hidden mt-6 text-center py-8">
            <div class="inline-block animate-spin rounded-full h-6 w-6 border-b-2 border-primary"></div>
            <p class="mt-2 text-sm text-muted-foreground">搜索中...</p>
        </div>

        <!-- 搜索错误状态 -->
        <div id="searchErrorState" class="hidden mt-6 text-center py-4">
            <div class="inline-block p-3 bg-destructive/10 text-destructive rounded-md text-sm">
                <p id="searchErrorMessage"></p>
            </div>
        </div>
    </div>
{% endblock %}

{% block extra_scripts %}
<script>
    // 搜索相关函数
    async function performSearch() {
        const query = document.getElementById('searchQuery').value.trim();
        if (!query) {
            alert('请输入搜索内容');
            return;
        }

        const topK = parseInt(document.getElementById('topK').value) || 10;
        const useRerank = document.getElementById('useRerank').checked;

        showSearchLoading();
        hideSearchResults();
        hideSearchError();

        try {
            const response = await fetch(`${API_BASE}/search`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    query: query,
                    top_k: topK,
                    use_rerank: useRerank,
                }),
            });

            const data = await response.json();

            if (response.ok) {
                displaySearchResults(data);
            } else {
                showSearchError(data.detail || '搜索失败');
            }
        } catch (error) {
            showSearchError(`搜索失败: ${error.message}`);
        }
    }

    function showSearchLoading() {
        document.getElementById('searchLoadingState').classList.remove('hidden');
        document.getElementById('searchResultsContainer').classList.add('hidden');
        document.getElementById('searchErrorState').classList.add('hidden');
    }

    function hideSearchLoading() {
        document.getElementById('searchLoadingState').classList.add('hidden');
    }

    function showSearchResults() {
        document.getElementById('searchResultsContainer').classList.remove('hidden');
    }

    function hideSearchResults() {
        document.getElementById('searchResultsContainer').classList.add('hidden');
    }

    function showSearchError(message) {
        hideSearchLoading();
        document.getElementById('searchErrorState').classList.remove('hidden');
        document.getElementById('searchErrorMessage').textContent = message;
    }

    function hideSearchError() {
        document.getElementById('searchErrorState').classList.add('hidden');
    }

    function displaySearchResults(data) {
        hideSearchLoading();
        showSearchResults();

        const resultsContainer = document.getElementById('searchResults');
        const countElement = document.getElementById('searchResultsCount');
        
        countElement.textContent = `找到 ${data.total} 个结果`;

        resultsContainer.innerHTML = '';

        if (data.results.length === 0) {
            resultsContainer.innerHTML = '<div class="text-center py-8 text-muted-foreground">未找到相关结果</div>';
            return;
        }

        data.results.forEach((result, index) => {
            const resultCard = createSearchResultCard(result, index + 1);
            resultsContainer.appendChild(resultCard);
        });
    }

    function createSearchResultCard(result, index) {
        const card = document.createElement('div');
        card.className = 'border border-border rounded-lg bg-card p-6 hover:shadow-md transition-shadow';

        const metadata = result.metadata || {};
        const docId = metadata.doc_id || 'unknown';
        const docTitle = metadata.doc_title || docId;
        const contentType = metadata.content_type || 'unknown';
        const sectionPath = metadata.section_path || [];
        const sectionPathStr = Array.isArray(sectionPath) ? sectionPath.join(' > ') : sectionPath;

        let scoreHtml = '';
        if (result.relevance_score !== null && result.relevance_score !== undefined) {
            const scorePercent = (result.relevance_score * 100).toFixed(1);
            scoreHtml = `
                <div class="mb-3">
                    <div class="flex items-center gap-2">
                        <span class="text-sm font-medium">相关性分数:</span>
                        <span class="text-sm font-semibold text-primary">${scorePercent}%</span>
                    </div>
                    ${result.relevance_reason ? `
                        <p class="text-xs text-muted-foreground mt-1">${escapeHtml(result.relevance_reason)}</p>
                    ` : ''}
                </div>
            `;
        }

        card.innerHTML = `
            <div class="flex items-start justify-between mb-3">
                <div class="flex-1">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="px-2 py-1 bg-primary/10 text-primary text-xs font-semibold rounded">#${index}</span>
                        <h4 class="text-base font-semibold">${escapeHtml(docTitle)}</h4>
                    </div>
                    <div class="flex items-center gap-4 text-xs text-muted-foreground mb-2">
                        <span>文档 ID: <code class="px-1 py-0.5 bg-muted rounded">${escapeHtml(docId)}</code></span>
                        <span>类型: <span class="px-1 py-0.5 bg-secondary rounded">${escapeHtml(contentType)}</span></span>
                        ${sectionPathStr ? `<span>路径: ${escapeHtml(sectionPathStr)}</span>` : ''}
                    </div>
                    ${scoreHtml}
                    <div class="mt-3 p-3 bg-muted rounded-md">
                        <p class="text-sm whitespace-pre-wrap">${escapeHtml(result.content)}</p>
                    </div>
                    ${result.id ? `
                        <details class="mt-3">
                            <summary class="text-xs text-muted-foreground cursor-pointer hover:text-foreground">查看元数据</summary>
                            <pre class="mt-2 p-2 bg-muted rounded text-xs overflow-auto">${JSON.stringify(metadata, null, 2)}</pre>
                        </details>
                    ` : ''}
                </div>
            </div>
        `;

        return card;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // 页面加载时初始化
    document.addEventListener('DOMContentLoaded', () => {
        // 搜索按钮
        document.getElementById('searchBtn').addEventListener('click', performSearch);

        // 搜索框回车键搜索
        document.getElementById('searchQuery').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                performSearch();
            }
        });
    });
</script>
{% endblock %}
